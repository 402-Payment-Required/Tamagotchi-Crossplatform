version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    target-branch: 'main'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 10
    # expo/react-native packages are pinned to the Expo SDK version; bumping them
    # individually breaks `expo install --check`. Upgrade via `expo upgrade` instead.
    ignore:
      - dependency-name: 'expo*'
      - dependency-name: '@expo/*'
      - dependency-name: 'react-native*'
      - dependency-name: '@react-native*'

  - package-ecosystem: 'github-actions'
    directory: '/'
    target-branch: 'main'
    schedule:
      interval: 'weekly'
      day: 'monday'
